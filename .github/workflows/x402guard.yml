name: x402guard
# x402guard's own CI: run the unit tests, then self-scan.
# (Drop-in template for YOUR repo is in the README — usually just:
#   npx x402guard . --json x402guard-report.json )
# We --exclude the ruleset files here because a SAST tool scanning its own
# rule definitions matches its own example patterns.
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Unit tests
        run: node test/run.js
      - name: Self-scan
        run: node bin/x402guard.js . --json x402guard-report.json --exclude rules.js
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x402guard-report
          path: x402guard-report.json
